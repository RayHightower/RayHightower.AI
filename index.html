<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RayHightower.AI</title>
    <meta name="description" content="RayHightower.AI uses artificial intelligence to create custom products for the commercial real estate industry.">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="images/favicon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="images/favicon.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');
        
        body {
            font-family: 'Inter', system_ui, sans-serif;
        }
        
        .heading {
            font-family: 'Space Grotesk', 'Inter', system_ui, sans-serif;
            font-weight: 600;
            letter-spacing: -0.04em;
        }
        
        .footer-logo {
            height: 28px;
            width: auto;
            transition: opacity 0.2s ease;
        }
        
        .footer-logo:hover {
            opacity: 0.75;
        }
        
        @media (min-width: 640px) {
            .footer-logo {
                height: 32px;
            }
        }

        .image-container {
            position: relative;
            display: inline-block;
            max-width: 820px;
            width: 100%;
        }

        .spaceship-image {
            width: 100%;
            border-radius: 1rem;
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.4);
        }

        #console-lights {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 1rem;
            pointer-events: none;
            z-index: 1;
        }
    </style>
</head>
<body class="bg-black text-white overflow-x-hidden">
    <div class="min-h-screen flex flex-col">
        
        <!-- Hero Section -->
        <div class="flex-1 flex items-center justify-center px-5 sm:px-6 py-10 sm:py-14">
            <div class="max-w-4xl mx-auto text-center">
                
                <!-- Image with Single Red Light -->
                <div class="image-container mx-auto mb-8 sm:mb-10">
                    <img 
                        src="images/RayHightower_spaceship.jpg" 
                        alt="RayHightower in a futuristic spaceship cockpit" 
                        class="spaceship-image"
                    >
                    <canvas id="console-lights"></canvas>
                </div>
                
                <!-- Logo / Company Name -->
                <h1 class="heading text-5xl sm:text-6xl md:text-7xl lg:text-8xl xl:text-[92px] font-semibold tracking-tighter mb-6 sm:mb-8 leading-none">
                    RayHightower.AI
                </h1>
                
                <!-- Description -->
                <p class="max-w-2xl mx-auto text-lg sm:text-xl md:text-2xl text-gray-300 leading-snug mb-10 sm:mb-14">
                    RayHightower.AI uses artificial intelligence to create custom products for the commercial real estate industry.
                </p>
                
                <!-- Tagline -->
                <div>
                    <p class="text-xl sm:text-2xl md:text-3xl text-gray-100 font-light tracking-tight leading-tight">
                        We blend the wisdom of humanity<br class="hidden sm:block">
                        with the speed of AI.
                    </p>
                </div>
                
            </div>
        </div>

        <!-- Footer -->
        <footer class="border-t border-gray-800 py-8 px-5 sm:px-6">
            <div class="max-w-3xl mx-auto">
                <p class="text-sm text-gray-500 text-center mb-5 sm:mb-6">
                    © 2026 RayHightower.AI. All rights reserved.
                </p>
                
                <div class="flex flex-wrap justify-center items-center gap-x-8 gap-y-4">
                    <a href="https://rayhightower.com" target="_blank" rel="noopener noreferrer" class="inline-block">
                        <img src="images/RayHightower_logo.svg" alt="RayHightower.com" class="footer-logo">
                    </a>
                    <a href="https://roiclear.com" target="_blank" rel="noopener noreferrer" class="inline-block">
                        <img src="images/ROIClear_logo_400.png" alt="ROIClear.com" class="footer-logo">
                    </a>
                    <a href="https://azmm.org" target="_blank" rel="noopener noreferrer" class="inline-block">
                        <img src="images/AZMM_logo.svg" alt="AZMM.org" class="footer-logo">
                    </a>
                </div>
            </div>
        </footer>
        
    </div>

    <script>
        const canvas = document.getElementById('console-lights');
        const ctx = canvas.getContext('2d');
        
        let redLight = null;
        
        function resizeCanvas() {
            const container = canvas.parentElement;
            canvas.width = container.offsetWidth;
            canvas.height = container.offsetHeight;
        }
        
        function initLight() {
            // Single red light in lower left corner
            redLight = {
                x: 0.22 * canvas.width,
                y: 0.88 * canvas.height,
                size: 3.5,
                baseOpacity: 0.45,
                phase: 0,
                speed: 0.75   // Slow, subtle red blink
            };
        }
        
        function drawLight() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const time = Date.now() / 1000;
            
            if (!redLight) return;
            
            const pulse = Math.sin(time * redLight.speed + redLight.phase) * 0.5 + 0.5;
            const opacity = redLight.baseOpacity * (0.55 + pulse * 0.9);
            
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#ef4444';
            
            ctx.fillStyle = `rgba(239, 68, 68, ${opacity})`;
            ctx.beginPath();
            ctx.arc(redLight.x, redLight.y, redLight.size, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.shadowBlur = 0;
        }
        
        function animate() {
            drawLight();
            requestAnimationFrame(animate);
        }
        
        function startAnimation() {
            resizeCanvas();
            initLight();
            animate();
        }
        
        window.addEventListener('resize', () => {
            resizeCanvas();
            initLight();
        });
        
        window.onload = function() {
            const img = document.querySelector('.spaceship-image');
            
            if (img.complete) {
                startAnimation();
            } else {
                img.onload = startAnimation;
            }
        };
    </script>
</body>
</html>
