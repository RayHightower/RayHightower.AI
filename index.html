<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RayHightower.AI</title>
    <meta name="description" content="RayHightower.AI uses artificial intelligence to create custom products for the commercial real estate industry.">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');
        
        body {
            font-family: 'Inter', system_ui, sans-serif;
        }
        
        .heading {
            font-family: 'Space Grotesk', 'Inter', system_ui, sans-serif;
            font-weight: 600;
            letter-spacing: -0.04em;
        }
        
        .footer-logo {
            height: 32px;
            width: auto;
            transition: opacity 0.2s ease;
        }
        
        .footer-logo:hover {
            opacity: 0.75;
        }
    </style>
</head>
<body class="bg-black text-white">
    <!-- Main Content -->
    <div class="min-h-screen flex flex-col">
        
        <!-- Hero Section -->
        <div class="flex-1 flex items-center justify-center px-6 py-12">
            <div class="max-w-3xl mx-auto text-center">
                
                <!-- Logo / Company Name -->
                <h1 class="heading text-7xl md:text-8xl lg:text-[92px] font-semibold tracking-tighter mb-8">
                    RayHightower.AI
                </h1>
                
                <!-- Description -->
                <p class="max-w-2xl mx-auto text-xl md:text-2xl text-gray-300 leading-tight mb-16">
                    RayHightower.AI uses artificial intelligence to create custom products for the commercial real estate industry.
                </p>
                
                <!-- Tagline -->
                <div class="pt-4">
                    <p class="text-2xl md:text-3xl text-gray-100 font-light tracking-tight">
                        We blend the wisdom of humanity<br class="hidden md:block">
                        with the speed of AI.
                    </p>
                </div>
                
            </div>
        </div>

        <!-- Footer -->
        <footer class="border-t border-gray-800 py-8 px-6">
            <div class="max-w-3xl mx-auto">
                
                <!-- Copyright -->
                <p class="text-sm text-gray-500 text-center mb-6">
                    © 2026 RayHightower.AI. All rights reserved.
                </p>
                
                <!-- Logo Links -->
                <div class="flex flex-wrap justify-center items-center gap-x-10 gap-y-5">
                    
                    <!-- RayHightower.com -->
                    <a href="https://rayhightower.com" 
                       target="_blank" 
                       rel="noopener noreferrer"
                       class="inline-block">
                        <img src="images/RayHightower_logo.svg" 
                             alt="RayHightower.com" 
                             class="footer-logo">
                    </a>
                    
                    <!-- ROIClear.com -->
                    <a href="https://roiclear.com" 
                       target="_blank" 
                       rel="noopener noreferrer"
                       class="inline-block">
                        <img src="images/ROIClear_logo_400.png" 
                             alt="ROIClear.com" 
                             class="footer-logo">
                    </a>
                    
                    <!-- AZMM.org -->
                    <a href="https://azmm.org" 
                       target="_blank" 
                       rel="noopener noreferrer"
                       class="inline-block">
                        <img src="images/AZMM_logo.svg" 
                             alt="AZMM.org" 
                             class="footer-logo">
                    </a>
                    
                </div>
                
            </div>
        </footer>
        
    </div>
</body>
</html>
